name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Migrate & Deploy to Vercel
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEED_ON_DEPLOY: ${{ secrets.SEED_ON_DEPLOY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply migrations to Vercel Postgres
        run: pnpm prisma:deploy

      - name: Seed (optional, first deploy only)
        if: env.SEED_ON_DEPLOY == 'true'
        run: pnpm prisma:seed

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel env
        run: vercel env pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
