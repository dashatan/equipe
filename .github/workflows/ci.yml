name: CI

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    env:
      # Placeholder values — CI only needs them present for the build to succeed;
      # no real DB connection is made during `next build`.
      DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public'
      AUTH_SECRET: 'ci-placeholder-secret-not-used-in-prod'
      NEXT_PUBLIC_BASE_URL: 'http://localhost:3000'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build
